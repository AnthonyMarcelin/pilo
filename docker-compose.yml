# docker-compose.yml — Pilo (référence)
# Cible : serveur perso (Proxmox), CPU uniquement, RAM ~4-5 Go libres pendant un scan.
#
# Services IA (llama-server, paddleocr-vl, ollama) toujours démarrés.
# Au repos, ils consomment ~900 Mo total — négligeable sur 5.8 Go libres.
# Plus de profil "ai" ni de socket Docker dans le queue.
#
# Budget RAM estimé :
#   llama-server (~1.8-2.2 Go) + paddleocr-vl (~0.4-0.6 Go) + ollama (~2.0 Go)
#   + app+web+db+redis+queue (~1.0-1.5 Go)
#   Total pic scan : ~3.7-4.8 Go. MESURER docker stats au premier vrai scan.

services:
  # --- Application Laravel (PHP-FPM) ---
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./:/var/www/html
      - storage_images:/var/www/html/storage/app/prescriptions
      # Volume persistant pour la base SQLite (survit aux rebuilds et à docker compose down/up)
      - sqlite_data:/var/sqlite
    restart: unless-stopped

  # --- Serveur web (Nginx) sert l'app + les assets Vite buildés ---
  web:
    image: nginx:stable-alpine
    depends_on:
      - app
    ports:
      - "8080:80"   # à exposer derrière votre reverse proxy
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # --- Worker de file d'attente (scan asynchrone) ---
  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command: php artisan queue:work --tries=3 --timeout=180
    env_file: .env
    depends_on:
      - app
      - redis
    volumes:
      - ./:/var/www/html
      - storage_images:/var/www/html/storage/app/prescriptions
      - sqlite_data:/var/sqlite
    restart: unless-stopped

  # --- Cache + file d'attente ---
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # --- Sidecar VLM : llama.cpp server (inférence PaddleOCR-VL GGUF), CPU ---
  #
  # Image CPU : ghcr.io/ggml-org/llama.cpp:server (tag sans suffixe = CPU-only).
  # Conventions de nommage du CI ggml-org/llama.cpp :
  #   :server           → CPU-only (tag "cpu" → suffixe vide dans le workflow)
  #   :server-intel     → Intel SYCL/GPU (oneAPI, SIGSEGV sur CPU sans GPU)
  #   :server-cuda      → NVIDIA CUDA, :server-vulkan → Vulkan, :server-rocm → AMD
  #
  # Pour épingler sur la version déployée sur la VM, récupérer le digest :
  #   docker inspect ghcr.io/ggml-org/llama.cpp:server --format '{{index .RepoDigests 0}}'
  # puis remplacer "image:" par "image: ghcr.io/ggml-org/llama.cpp@sha256:XXXXX"
  #
  # PRÉREQUIS — télécharger les modèles VL dans le volume pilo_vl_models AVANT le démarrage :
  #
  #   # Modèle VL 1.6 (primaire, ~936 Mo + ~882 Mo mmproj = ~1.8 Go total sur disque)
  #   docker run --rm -v pilo_vl_models:/models alpine sh -c "
  #     wget -q -O /models/PaddleOCR-VL-1.6-GGUF.gguf \
  #       'https://huggingface.co/PaddlePaddle/PaddleOCR-VL-1.6-GGUF/resolve/main/PaddleOCR-VL-1.6-GGUF.gguf' &&
  #     wget -q -O /models/PaddleOCR-VL-1.6-GGUF-mmproj.gguf \
  #       'https://huggingface.co/PaddlePaddle/PaddleOCR-VL-1.6-GGUF/resolve/main/PaddleOCR-VL-1.6-GGUF-mmproj.gguf'
  #   "
  #   # Fallback VL 1.5 (si VL 1.6 est indisponible) :
  #   #   /models/PaddleOCR-VL-1.5.gguf + /models/PaddleOCR-VL-1.5-mmproj.gguf
  #   #   (même taille ~936+882 Mo — PAS plus petit que 1.6 contrairement à ce qu'indiquait CLAUDE.md)
  #
  # RAM attendue llama-server au runtime : ~1.8-2.2 Go (modèle + mmproj + KV cache 4096 ctx).
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server  # CPU-only (sans suffixe GPU)
    expose:
      - "8111"
    volumes:
      - vl_models:/models:ro
    command: >
      --model /models/PaddleOCR-VL-1.6-GGUF.gguf
      --mmproj /models/PaddleOCR-VL-1.6-GGUF-mmproj.gguf
      --host 0.0.0.0
      --port 8111
      --ctx-size 4096
      --threads 4
    restart: unless-stopped
    # CPU only : pas de section deploy/gpu.

  # --- Service OCR : PaddleOCR-VL pipeline Python (layout + agrégation) ---
  # Dépend de llama-server (sidecar VLM).
  # Expose POST /ocr → JSON blocs ordonnés.
  # Voir docker/paddleocr/app.py pour le détail du contrat de réponse.
  paddleocr-vl:
    build:
      context: ./docker/paddleocr
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      # URL BASE du sidecar llama-server — sans /v1 (PaddleOCRVL ajoute le chemin).
      LLAMA_SERVER_URL: "http://llama-server:8111"
    volumes:
      - paddle_models:/root/.paddleocr
    depends_on:
      - llama-server
    restart: unless-stopped
    # CPU only : pas de section deploy/gpu.

  # --- Service LLM : Ollama (blocs OCR -> JSON structuré, normalisation) ---
  # Modèle : Qwen2.5 3B instruct avec constrained decoding (paramètre format=<schema>).
  # IMPORTANT : toujours passer le schéma de l'ordonnance via format=, pas seulement dans le prompt.
  # Après le 1er démarrage :
  #   docker compose exec ollama ollama pull qwen2.5:3b-instruct
  ollama:
    image: ollama/ollama:0.24.0
    expose:
      - "11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  redis_data:
  storage_images:
  paddle_models:
  ollama_models:
  # Volume pour les fichiers GGUF de PaddleOCR-VL.
  # Contenu attendu : PaddleOCR-VL-1.6-GGUF.gguf + PaddleOCR-VL-1.6-GGUF-mmproj.gguf (~1.8 Go total).
  # Fallback : PaddleOCR-VL-1.5.gguf + PaddleOCR-VL-1.5-mmproj.gguf (même taille, adapter --model).
  vl_models:
  # Volume persistant pour la base SQLite — montée dans app et queue sur /var/sqlite.
  # Survit à docker compose down/up. Supprimé uniquement par docker compose down -v.
  sqlite_data:
