# docker-compose.yml — Pilo (cloud, driver Mistral OCR)
# Requiert MISTRAL_API_KEY dans .env.
# Activer ZDR sur console.mistral.ai avant usage en prod.

services:
  # --- Application Laravel (PHP-FPM) ---
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./:/var/www/html
      - storage_images:/var/www/html/storage/app/private/prescriptions
      # Volume persistant pour la base SQLite (survit aux rebuilds et à docker compose down/up)
      - sqlite_data:/var/sqlite
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped

  # --- Serveur web (Nginx) sert l'app + les assets Vite buildés ---
  web:
    image: nginx:stable-alpine
    depends_on:
      - app
    ports:
      - "8080:80"   # à exposer derrière votre reverse proxy
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 128m
    memswap_limit: 128m
    restart: unless-stopped

  # --- Worker de file d'attente (scan asynchrone) ---
  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    command: php artisan queue:work --tries=1 --timeout=120
    env_file: .env
    environment:
      SKIP_ASSET_COPY: "1"
    depends_on:
      - app
      - redis
    volumes:
      - ./:/var/www/html
      - storage_images:/var/www/html/storage/app/private/prescriptions
      - sqlite_data:/var/sqlite
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped

  # --- Cache + file d'attente ---
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    mem_limit: 200m
    memswap_limit: 200m
    restart: unless-stopped

volumes:
  redis_data:
  storage_images:
  sqlite_data:
